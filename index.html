<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 1: Introduction to the Pyramids

Hi I am 13 years old and I made this book about the pyramids in Egypt because they are so cool and mysterious. The Great Pyramid is the biggest and most amazing one of all. It was built more than 4,500 years ago for Pharaoh Khufu. Thats older than almost anything else we know! It is made of over two million giant stone blocks, some weighing tons each. Even today with modern cranes it would be super hard to move them safely without breaking anything.

There are three big pyramids at Giza. The Great Pyramid is the tallest, then theres one for Khafre and a smaller one for Menkaure. They are lined up perfectly and face exactly north, south, east, and west. The ancient builders used the stars to get the directions right which is really impressive. Most people think the pyramids were only fancy tombs for the kings but I think there is way more to the story. Inside there are secret chambers like the King’s Chamber and Queen’s Chamber plus long narrow passages that are kind of scary.

Scientists have already found hidden voids and empty spaces using special scanners and robots. One big void is as large as a jet airplane! But the most exciting part is what might be deep underground. New radar technology called SAR has shown possible huge man-made structures way below the Great Pyramid. Some researchers say there are eight giant pillars that go down over 600 meters and two enormous boxes at the bottom. The whole system might stretch almost 2 kilometers!

In this book I will explain the best case for these discoveries across all eight chapters. The best case is that the ancient Egyptians were much smarter than we thought. They built a giant underground system with spiral pillars and giant boxes. Its really mind blowing and makes you wonder what else they hid under the sand. I got super excited learning about this and I hope you do too! Pyramids are the coolest things ever and this underground stuff makes them even more mysterious. Maybe one day I can visit Egypt and see the pyramids in real life. Until then, learning about the secret 2 kilometer system is the next best thing. This could change how we think about ancient history forever.`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
