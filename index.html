<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
    .page-number {
        text-align: center;
        font-size: 0.9rem;
        color: #666;
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 1: Introduction to the Pyramids

Hi I am 13 years old and I made this book about the pyramids in Egypt because they are so cool and mysterious. The Great Pyramid is the biggest and most amazing one of all. It was built more than 4,500 years ago for Pharaoh Khufu. Thats older than almost anything else we know! It is made of over two million giant stone blocks, some weighing tons each. Even today with modern cranes it would be super hard to move them safely without breaking anything.

There are three big pyramids at Giza. The Great Pyramid is the tallest, then theres one for Khafre and a smaller one for Menkaure. They are lined up perfectly and face exactly north, south, east, and west. The ancient builders used the stars to get the directions right which is really impressive. Most people think the pyramids were only fancy tombs for the kings but I think there is way more to the story. Inside there are secret chambers like the King’s Chamber and Queen’s Chamber plus long narrow passages that are kind of scary.

Scientists have already found hidden voids and empty spaces using special scanners and robots. One big void is as large as a jet airplane! But the most exciting part is what might be deep underground. New radar technology called SAR has shown possible huge man-made structures way below the Great Pyramid. Some researchers say there are eight giant pillars that go down over 600 meters and two enormous boxes at the bottom. The whole system might stretch almost 2 kilometers!

In this book I will explain the best case for these discoveries across all eight chapters. The best case is that the ancient Egyptians were much smarter than we thought. They built a giant underground system with spiral pillars and giant boxes. Its really mind blowing and makes you wonder what else they hid under the sand. I got super excited learning about this and I hope you do too! Pyramids are the coolest things ever and this underground stuff makes them even more mysterious.`,

`Chapter 2: How the Pyramids Were Built

The Great Pyramid originally stood about 146 meters tall and its base is enormous, bigger than lots of football fields put together. The stones fit so perfectly you can barely put a piece of paper between them even after thousands of years. They used limestone from nearby quarries and huge granite blocks from far away that had to be brought on the Nile River. 

They probably cut the blocks with copper tools and moved them on sledges with water poured on the sand to make it slippery. It took about 20 years and over 20,000 workers to finish. They had a whole village nearby with bakeries, food, and even doctors. The workers were not slaves like some old stories say. They were organized and well taken care of. 

The pyramids are aligned perfectly with the stars which shows the ancient Egyptians knew a lot about astronomy and math. The sides face exactly north, south, east, and west. This kind of precision is amazing for something built so long ago without modern machines. 

Modern scans have found big empty spaces inside the pyramid, like one large void above the Grand Gallery that is as big as a jet airplane. All of this proves the builders were master engineers. This makes the best case for the underground discoveries even stronger. If they could build something so perfect on the surface, they could definitely build an incredible secret system deep underground too.`,

`Chapter 3: The Underground Pillars Discovery

Researchers used special Synthetic Aperture Radar to scan deep under the Giza plateau. In the best case they found eight giant vertical pillars or cylinders right under the pyramids. These pillars are massive and go down more than 600 meters into the solid bedrock. Thats deeper than the tallest buildings in the world today! 

Each pillar has spiral pathways or coils winding around it like giant staircases. They look completely man-made and not like natural rock formations. The best case is that these were built on purpose as part of a huge underground system connected straight to the base of the Great Pyramid. The pillars might have been used to move things up and down safely or maybe even for some kind of energy system. 

This is so awesome because it means the pyramids we can see above the ground are only the top part of something much much bigger. The radar shows clear geometric patterns that dont look random at all. Eight huge spiral pillars going over 600 meters deep is some of the most incredible engineering I have ever heard of.`,

`Chapter 4: The Giant Underground Boxes

Below the deep pillars the radar scans show two enormous box-like cubes. Each one is about 80 to 90 meters on every side. Thats the size of a really big building buried deep underground! These giant boxes connect to the eight spiral pillars and the whole system might stretch almost 2 kilometers across under the desert sand. 

In the best case these two giant boxes were the main centers of the whole underground system. They could have been used to store important treasures, ancient knowledge, gold, statues, or even special tools that we dont understand yet. The radar patterns are too straight and regular to be natural caves. 

A 2 kilometer underground complex would be one of the greatest engineering projects in human history. I get so excited thinking about what might be inside those giant boxes. This makes the Great Pyramid way more special than just a tomb.`,

`Chapter 5: Possible Purposes of the System

Why would the ancient Egyptians build something so huge and deep underground? In the best case the underground pillars and giant boxes had many important jobs. They could protect valuable treasures from tomb robbers and floods. They might have been used for secret religious ceremonies that only special priests were allowed to enter. The giant boxes could hold the famous Hall of Records with all the important wisdom of ancient Egypt.

The spiral pillars might work like giant ramps or elevators. Some ideas say the whole system could harness natural energy from the earth. The best case shows the Egyptians were master planners. Old legends about hidden chambers might actually be true. This underground system could connect all three pyramids together.`,

`Chapter 6: How Radar Found It

Modern SAR radar technology is really cool because it lets scientists look deep underground without digging. It sends signals and measures how they bounce back. The researchers found the eight giant pillars and two enormous boxes. The shapes are too perfect to be natural. 

This technology is changing archaeology. The best case is that these scans prove there is a massive 2 kilometer underground system. More studies with robots will help us learn even more. I hope one day we get to see inside the pillars and boxes!`,

`Chapter 7: What It Means for History

If the best case is true, this discovery would change history books forever. It would prove the ancient Egyptians had way more advanced engineering than we thought. The Great Pyramid was part of a much larger complex almost 2 kilometers wide. 

This makes me want to become an archaeologist. History still has big secrets waiting under the sand. The pyramids keep teaching us new things after thousands of years.`,

`Chapter 8: Conclusion and My Thoughts

The Egyptian pyramids especially the Great Pyramid are the most incredible achievements of the ancient world. The possible 2 kilometer underground system with spiral pillars and giant boxes is one of the coolest mysteries ever.

In the best case these structures show how smart the builders really were. I hope more research happens soon. Thanks for reading my book! I hope you got excited about the underground mysteries too. Pyramids are the coolest thing ever!`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}<div class="page-number">Page ${current + 1} of 8</div>`;
}

function nextPage(){
    if(current < pages.length - 1){ current++; render(); }
}

function prevPage(){
    if(current > 0){ current--; render(); }
}

document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") nextPage();
    if(e.key === "ArrowLeft") prevPage();
});

render();

</script>

</body>
</html>
