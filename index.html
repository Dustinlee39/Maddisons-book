<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 5: Possible Purposes of the System

Why would the ancient Egyptians build something so huge and deep underground? In the best case the underground pillars and giant boxes had many important jobs. They could protect valuable treasures from tomb robbers and floods. They might have been used for secret religious ceremonies that only special priests were allowed to enter. The giant boxes could hold the famous Hall of Records with all the important wisdom and knowledge of ancient Egypt.

The spiral pillars might work like giant ramps or elevators so people could go down safely without falling. Some ideas say the whole system could harness natural energy from the earth using underground water channels. The pyramids on top would focus that energy down into the boxes below like a giant battery. That would make the entire Giza plateau one big powerful machine.

The best case shows the Egyptians were master planners who thought of everything. Old legends about hidden chambers and halls of records under the pyramids might actually be true. This underground system could connect all three big pyramids together underground. Whether it was for power, storage, protection, or religion, it proves how incredibly clever and ambitious the ancient people really were. 

I love this idea because it makes history way more exciting and mysterious. Instead of just big tombs, the pyramids could have been part of something much larger and more advanced. The ancient Egyptians must have spent many generations planning and building this secret 2 kilometer system. They had to dig through solid rock, make perfect straight lines, and hide everything so well that we are only finding it now with modern radar.

This chapter is all about the possible purposes and why the best case makes so much sense. It fits with many old stories and explains why the pyramids were built with such amazing precision. The more I think about it, the more I believe the ancients were much smarter than most people give them credit for. Maybe one day we will finally get to see inside the giant boxes and discover amazing things that change what we learn in school. That would be the coolest thing ever!`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
