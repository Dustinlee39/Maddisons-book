<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 8: Conclusion and My Thoughts

The Egyptian pyramids especially the Great Pyramid are the most incredible achievements of the ancient world. The possible discovery of eight deep spiral pillars going over 600 meters down and two giant boxes as part of a nearly 2 kilometer underground system is one of the coolest mysteries ever. 

In the best case these structures show how smart and ambitious the builders really were. They might have built the whole system for power, protection of treasures, storage of important knowledge, or special religious reasons. Whatever the exact purpose, it proves the ancient Egyptians were master engineers who planned everything very carefully. The surface pyramids and the secret underground parts all worked together as one giant complex. 

I really hope more research happens soon so we can learn the full truth. Maybe one day scientists will send robots or small cameras down the spiral pillars to explore the giant boxes. That would be super exciting! Making this book taught me that there is always more to discover in history. The past is full of secrets and the pyramids are still surprising us after 4,500 years. 

This project made me think differently about ancient people. They were much smarter and more advanced than many people believe. The best case for the 2 kilometer underground system makes the pyramids even more special and mysterious. I loved learning about the radar scans, the giant pillars with spirals, and the enormous boxes deep underground. 

Thanks for reading my 8-chapter book! I hope you got as excited about the underground mysteries as I did while writing it. Pyramids are the coolest things ever and the best case for this hidden system makes them even better. Maybe when I grow up I can visit Egypt and see the Great Pyramid in real life. Until then, I will keep reading and learning about all the new discoveries. History is awesome and there is still so much waiting to be found under the sand.`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
