<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 2: How the Pyramids Were Built

The Great Pyramid originally stood about 146 meters tall and its base is enormous, bigger than lots of football fields put together. The stones fit so perfectly you can barely put a piece of paper between them even after thousands of years. They used limestone from nearby quarries and huge granite blocks from far away that had to be brought on the Nile River. 

They probably cut the blocks with copper tools and moved them on sledges with water poured on the sand to make it slippery. It took about 20 years and over 20,000 workers to finish. They had a whole village nearby with bakeries, food, and even doctors. The workers were not slaves like some old stories say. They were organized and well taken care of. 

The pyramids are aligned perfectly with the stars which shows the ancient Egyptians knew a lot about astronomy and math. The sides face exactly north, south, east, and west. This kind of precision is amazing for something built so long ago without modern machines. 

Modern scans have found big empty spaces inside the pyramid, like one large void above the Grand Gallery that is as big as a jet airplane. All of this proves the builders were master engineers. This makes the best case for the underground discoveries even stronger. If they could build something so perfect on the surface, they could definitely build an incredible secret system deep underground too. 

The best case is that the whole thing is one giant connected complex. The surface pyramids and the underground pillars and boxes all work together. I think its awesome how much planning and hard work went into every single part of the project. The ancient people must have been really smart and patient to create something that would last for thousands of years. This chapter shows how amazing the pyramids are above ground, which helps us believe the best case about the giant 2 kilometer underground system below them.`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
