<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Mysteries of the Pyramids</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active { background: #5c3a1f; }
    .page-number {
        text-align: center;
        font-size: 0.9rem;
        color: #666;
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>
    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 1: Introduction to the Pyramids

Hi I am 13 years old and I made this book about the pyramids in Egypt because they are so cool and mysterious. The Great Pyramid is the biggest and most amazing one of all. It was built more than 4,500 years ago for Pharaoh Khufu. Thats older than almost anything else we know! It is made of over two million giant stone blocks, some weighing tons each. Even today with modern cranes it would be super hard to move them safely without breaking anything.

There are three big pyramids at Giza. The Great Pyramid is the tallest, then theres one for Khafre and a smaller one for Menkaure. They are lined up perfectly and face exactly north, south, east, and west. Most people think the pyramids were only fancy tombs for the kings but I think there is way more to the story.`,

`Chapter 2: How the Pyramids Were Built

The Great Pyramid originally stood about 146 meters tall and its base is enormous, bigger than lots of football fields put together. The stones fit so perfectly you can barely put a piece of paper between them even after thousands of years. They used limestone from nearby quarries and huge granite blocks from far away that had to be brought on the Nile River during flood season. 

They probably cut the blocks with copper tools and moved them on sledges with water poured on the sand to make it slippery. It took about 20 years and over 20,000 workers to finish the project. They had a whole village nearby with bakeries, food, and even doctors. The workers were not slaves like some old stories say.`,

`Chapter 3: The Underground Pillars Discovery

Researchers used special Synthetic Aperture Radar to scan deep under the Giza plateau. In the best case they found eight giant vertical pillars or cylinders right under the pyramids. These pillars are massive and go down more than 600 meters into the solid bedrock. Thats deeper than the tallest buildings in the world today! 

Each pillar has spiral pathways or coils winding around it like giant staircases. They look completely man-made and not like natural rock formations at all.`,

`Chapter 4: The Giant Underground Boxes

Below the deep pillars the radar scans show two enormous box-like cubes. Each one is about 80 to 90 meters on every side. Thats the size of a really big building buried deep underground! These giant boxes connect to the eight spiral pillars and the whole system might stretch almost 2 kilometers across under the desert sand. 

In the best case these two giant boxes were the main centers of the whole underground system. They could have been used to store important treasures, ancient knowledge, gold, statues, or even special tools that we dont understand yet.`,

`Chapter 5: Possible Purposes of the System

Why would the ancient Egyptians build something so huge and deep underground? In the best case the underground pillars and giant boxes had many important jobs. They could protect valuable treasures from tomb robbers and floods. They might have been used for secret religious ceremonies that only special priests were allowed to enter.`,

`Chapter 6: How Radar Found It

Modern SAR radar technology is really cool because it lets scientists look deep underground without digging up anything. SAR stands for Synthetic Aperture Radar. It works by sending special signals from satellites or planes and then measuring how those signals bounce back from different materials under the ground. 

The researchers used this technology to scan under the Giza plateau. In the best case, the radar clearly showed the eight giant spiral pillars and the two enormous boxes deep below. The shapes are too perfect and geometric to be natural caves or random rock formations. 

This technology is changing archaeology because it is safe and doesn’t damage the ancient sites. The best case is that these deep scans finally prove there is a massive almost 2 kilometer underground system connected to the Great Pyramid.`,

`Chapter 7: What It Means for History

If the best case is true, finding eight deep spiral pillars and two giant boxes would change history books forever. It would prove that the ancient Egyptians had way more advanced engineering skills than we thought. They could plan and build on a giant scale both above the ground and deep underground. 

This discovery would show that the Great Pyramid was not just a fancy tomb for a king. It was probably part of a much larger complex that stretches almost 2 kilometers across under the desert. The whole Giza plateau might have been one giant connected system with the pyramids on top and the secret pillars and boxes below.`,

`Chapter 8: Conclusion and My Thoughts

The Egyptian pyramids especially the Great Pyramid are the most incredible achievements of the ancient world. The possible discovery of eight deep spiral pillars going over 600 meters down and two giant boxes as part of a nearly 2 kilometer underground system is one of the coolest mysteries ever. 

In the best case these structures show how smart and ambitious the builders really were. They might have built the whole system for power, protection of treasures, storage of important knowledge, or special religious reasons. Whatever the exact purpose, it proves the ancient Egyptians were master engineers who planned everything very carefully. The surface pyramids and the secret underground parts all worked together as one giant complex. 

I really hope more research happens soon so we can learn the full truth. Maybe one day scientists will send robots or small cameras down the spiral pillars to explore the giant boxes. That would be super exciting! Making this book taught me that there is always more to discover in history. The past is full of secrets and the pyramids are still surprising us after 4,500 years. 

This project made me think differently about ancient people. They were much smarter and more advanced than many people believe. The best case for the 2 kilometer underground system makes the pyramids even more special and mysterious. I loved learning about the radar scans, the giant pillars with spirals, and the enormous boxes deep underground. 

Thanks for reading my 8-chapter book! I hope you got as excited about the underground mysteries as I did while writing it. Pyramids are the coolest things ever and the best case for this hidden system makes them even better. Maybe when I grow up I can visit Egypt and see the Great Pyramid in real life.`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}<div class="page-number">Page ${current + 1} of 8</div>`;
}

function nextPage(){
    if(current < pages.length - 1){ current++; render(); }
}

function prevPage(){
    if(current > 0){ current--; render(); }
}

document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") nextPage();
    if(e.key === "ArrowLeft") prevPage();
});

render();

</script>

</body>
</html>
