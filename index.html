<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Book</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="reader">
<div class="page" id="page"></div>

<div class="controls">
<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>
</div>
</div>

<script>

const pages = [

`Chapter 1: Introduction to the Pyramids

Hi I am 13 years old and I made this book about the pyramids in Egypt because they are so cool and mysterious. The Great Pyramid is the biggest and most amazing one. It was built more than 4,500 years ago for Pharaoh Khufu. Thats older than almost anything else we know! It is made of over two million giant stone blocks, some weighing tons. Even today with modern cranes it would be super hard to move them.

There are three big pyramids at Giza. They are lined up perfectly with the stars and face exactly north, south, east, and west. Most people think they were only tombs but I think there is way more to the story. Inside there are secret chambers and long passages. Scientists have already found hidden voids using special scanners.

The most exciting part is what might be deep underground. New radar technology called SAR has shown possible huge man-made structures way below the Great Pyramid. In this book I will explain the best case for these discoveries. The best case is that the ancient Egyptians were much smarter than we thought and built a giant underground system almost 2 kilometers big with pillars and boxes. Its really mind blowing and makes you wonder what else they hid. I got super excited learning about this and I hope you do too!`,

`Chapter 2: How the Pyramids Were Built

The Great Pyramid originally stood about 146 meters tall and its base is enormous, bigger than lots of football fields put together. The stones fit so perfectly you can barely put a piece of paper between them even after thousands of years. They used limestone from nearby and granite from far away quarries.

They probably cut the blocks with copper tools and moved them on sledges with water to make the sand slippery. During flood season they used the Nile River like a highway. It took about 20 years and over 20,000 workers. They had a whole village with food and doctors, they were not slaves like some old stories say.

The pyramids are aligned perfectly using the stars which shows they knew a lot about astronomy. Modern scans found big empty spaces inside like one above the Grand Gallery thats as big as a jet. All this proves the builders were master engineers. This makes the best case for the underground stuff even stronger. If they could build something so perfect on top, they could definitely build amazing things deep underground too. The best case is the whole thing is one giant connected complex.`,

`Chapter 3: The Underground Pillars Discovery

Researchers used Synthetic Aperture Radar to scan deep under the Giza plateau. In the best case they found eight giant vertical pillars or cylinders right under the pyramids. These pillars are massive and go down more than 600 meters into the bedrock. Thats deeper than the tallest buildings in the world!

Each pillar has spiral pathways or coils winding around it like giant staircases. They look completely man-made, not natural. The best case is that these were built on purpose as part of a huge underground system connected straight to the base of the Great Pyramid. The pillars might have been used to move things up and down or for some kind of energy.

This is so awesome because it means the pyramids we see are only the top part of something much bigger. The radar shows clear geometric patterns that dont look random. I think the best case is true because everything lines up too perfectly to be an accident. Eight huge spiral pillars over 600 meters deep is incredible engineering. This discovery could change everything we know about ancient Egypt. The ancients were way more advanced than we give them credit for!`,

`Chapter 4: The Giant Underground Boxes

Below the deep pillars the radar shows two enormous box-like cubes. Each one is about 80 to 90 meters on every side. Thats the size of a big building buried deep underground! These giant boxes connect to the pillars and the whole system might stretch almost 2 kilometers across under the desert.

In the best case these two boxes were the main centers of the whole system. They could have stored important treasures, knowledge, or even worked as part of an ancient power system. The pillars with spirals act like giant connectors between the pyramid above and the boxes way down below.

The radar patterns are too straight and regular to be natural caves. The best case is that this is all artificial and built by the same smart people who made the pyramids. A 2 kilometer underground complex would be one of the greatest engineering projects ever. I get so excited thinking about what might be inside those giant boxes — maybe statues, writings, or secrets we havent discovered yet. This makes the Great Pyramid even more special.`,

`Chapter 5: Possible Purposes of the System

Why build something so huge and deep? In the best case the underground pillars and boxes had many important jobs. They could protect treasures from robbers and floods. They might have been used for secret religious ceremonies that only special priests knew about. The giant boxes could hold the Hall of Records with all the wisdom of ancient Egypt.

The spiral pillars might work like ramps or elevators. Some ideas say the whole system could harness energy from the earth using underground water channels. The pyramids on top would focus that energy down into the boxes below. That would make the whole Giza plateau like a giant machine.

The best case shows the Egyptians were master planners who thought of everything. Old legends about hidden chambers under the pyramids might actually be true. This underground system could connect all three pyramids together. Whether it was for power, storage, or religion, it proves how clever and ambitious they were. I love this idea because it makes history way more exciting.`,

`Chapter 6: How Radar Found It

Modern SAR radar technology lets scientists look deep underground without digging. It sends signals and measures how they bounce back from different materials. This way we can see hidden things without damaging the pyramids.

The researchers found the eight pillars and two giant boxes by studying the radar reflections. At first it was hard to believe but the patterns kept showing up. In the best case the data is clear enough to trust. The shapes are too perfect to be natural.

This technology is really cool because it lets us explore the past safely. The best case is that these deep scans finally prove there is a massive 2 kilometer system below the Great Pyramid. More studies with robots and better scanners will help us learn even more. Radar is changing what we know about ancient wonders. I think this is only the beginning of new discoveries at Giza.`,

`Chapter 7: What It Means for History

If the best case is true, finding eight deep spiral pillars and two giant boxes would change history books forever. It would prove the ancient Egyptians had way more advanced engineering than we thought. They could plan and build on a giant scale both above and below ground.

This discovery would show the Great Pyramid was not just a tomb but part of a much larger complex almost 2 kilometers wide. It might explain many old legends and mysteries about Giza. The past would feel more alive and full of surprises.

Even now these ideas make me want to become an archaeologist or scientist. History is not finished — there are still big secrets waiting under the sand. The best case makes me proud of what humans could do thousands of years ago. The pyramids keep teaching us new things.`,

`Chapter 8: Conclusion and My Thoughts

The Egyptian pyramids especially the Great Pyramid are the most incredible achievements of the ancient world. The possible discovery of eight deep spiral pillars going over 600 meters down and two giant boxes as part of a nearly 2 kilometer underground system is one of the coolest mysteries ever.

In the best case these structures show how smart and ambitious the builders really were. They might have built it for power, protection, storage, or religious reasons. Whatever the purpose, it proves they were master engineers.

I really hope more research happens soon so we can learn the full truth. Maybe one day robots will explore the pillars and boxes. Making this book taught me there is always more to discover in history. The past is full of secrets and the pyramids are still surprising us after 4,500 years.

Thanks for reading my book! I hope you got as excited about the underground mysteries as I did. Pyramids are the coolest thing ever and the best case for the 2 kilometer system makes them even better.`

];

let current = 0;

function render(){
 document.getElementById("page").innerText = pages[current];
}

function nextPage(){
 if(current < pages.length - 1){ current++; render(); }
}

function prevPage(){
 if(current > 0){ current--; render(); }
}

document.addEventListener("keydown", e=>{
 if(e.key === "ArrowRight") nextPage();
 if(e.key === "ArrowLeft") prevPage();
});

render();

</script>

</body>
</html>
