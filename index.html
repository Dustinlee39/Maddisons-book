<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Mysteries of the Pyramids</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active { background: #5c3a1f; }
    .page-number {
        text-align: center;
        font-size: 0.9rem;
        color: #666;
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>
    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 1: Introduction to the Pyramids

Hi I am 13 years old and I made this book about the pyramids in Egypt because they are so cool and mysterious. The Great Pyramid is the biggest and most amazing one of all. It was built more than 4,500 years ago for Pharaoh Khufu. Thats older than almost anything else we know! It is made of over two million giant stone blocks, some weighing tons each. Even today with modern cranes it would be super hard to move them safely.

There are three big pyramids at Giza. The Great Pyramid is the tallest, then theres one for Khafre and a smaller one for Menkaure. They are lined up perfectly and face exactly north, south, east, and west using the stars. Most people think they were only tombs but I think there is way more. Inside there are secret chambers and long passages. Scientists found hidden voids with scanners.

The most exciting part is deep underground. New SAR radar shows possible huge man-made structures below the Great Pyramid — eight giant pillars over 600 meters deep with spirals and two enormous boxes. The whole system might be almost 2 kilometers big. In this book I explain the best case for these discoveries. The best case is the ancient Egyptians were much smarter than we thought and built a secret giant underground complex. Its mind blowing!`,

`Chapter 2: How the Pyramids Were Built

The Great Pyramid stood about 146 meters tall with a huge base. The stones fit so perfectly you can barely fit paper between them after thousands of years. They used limestone and granite brought from far away on the Nile River.

It took about 20 years and over 20,000 workers. They had a village with food and doctors. The pyramids are perfectly aligned with the stars showing great astronomy knowledge. Modern scans found big voids inside including one as big as a jet airplane.

This proves the builders were master engineers. This makes the best case for the underground system even stronger. If they built something so perfect above ground, they could definitely build an amazing 2 kilometer underground system with pillars and boxes too.`,

`Chapter 3: The Underground Pillars Discovery

Researchers used Synthetic Aperture Radar and in the best case found eight giant vertical pillars under the pyramids. These pillars go down more than 600 meters into bedrock. Each has spiral pathways like giant staircases. They look completely man-made.

The best case is they were built as part of a huge underground system connected to the Great Pyramid. The radar shows clear geometric patterns. Eight huge spiral pillars over 600 meters deep is incredible engineering. This could change everything we know about ancient Egypt.`,

`Chapter 4: The Giant Underground Boxes

Below the pillars are two enormous box-like cubes about 80 to 90 meters on each side. The whole system might stretch almost 2 kilometers. In the best case these boxes were main centers for storage or power. The radar patterns are too regular to be natural.

This could be one of the greatest engineering projects ever. I get excited thinking what might be inside those giant boxes. This makes the pyramids much more special.`,

`Chapter 5: Possible Purposes of the System

In the best case the system could protect treasures, be used for secret ceremonies, or hold the Hall of Records. The spiral pillars might work like ramps or for energy. The pyramids on top might focus energy into the boxes.

Old legends might be true. This proves how clever the Egyptians were. This makes history much more exciting.`,

`Chapter 6: How Radar Found It

SAR radar sends signals and measures reflections to see deep underground safely. In the best case it clearly showed the pillars and boxes. The shapes are too perfect to be natural.

This technology is changing what we know about the past. More studies will tell us even more.`,

`Chapter 7: What It Means for History

If true, this would rewrite history. It proves the Egyptians had advanced engineering above and below ground. The Great Pyramid was part of something much bigger.

This makes me want to be an archaeologist. There are still big secrets under the sand.`,

`Chapter 8: Conclusion and My Thoughts

The pyramids are the most incredible ancient achievement. The possible 2 kilometer underground system with spiral pillars and giant boxes is one of the coolest mysteries.

In the best case it shows how smart the builders were. I hope more research happens soon. Thanks for reading my book! Pyramids are the coolest and this underground discovery makes them even better.`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}<div class="page-number">Page ${current + 1} of 8</div>`;
}

function nextPage(){
    if(current < pages.length - 1){ current++; render(); }
}

function prevPage(){
    if(current > 0){ current--; render(); }
}

document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") nextPage();
    if(e.key === "ArrowLeft") prevPage();
});

render();

</script>

</body>
</html>
