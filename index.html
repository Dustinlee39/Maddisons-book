<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 7: What It Means for History

If the best case is true, finding eight deep spiral pillars and two giant boxes would change history books forever. It would prove that the ancient Egyptians had way more advanced engineering skills than we thought. They could plan and build on a giant scale both above the ground and deep underground. 

This discovery would show that the Great Pyramid was not just a fancy tomb for a king. It was probably part of a much larger complex that stretches almost 2 kilometers across under the desert. The whole Giza plateau might have been one giant connected system with the pyramids on top and the secret pillars and boxes below. 

This could explain many old legends and mysteries about hidden chambers and the Hall of Records under the pyramids. It might also explain why the pyramids were built with such perfect precision and alignment. The best case makes history much more exciting because it shows that ancient people were smarter and more ambitious than most school books teach us. 

Even now, these ideas make me want to become an archaeologist or scientist when I grow up. History is not finished — there are still big secrets waiting under the sand. The best case makes me proud of what humans could do thousands of years ago without any modern machines or computers. The pyramids keep teaching us new things after all this time. 

If scientists confirm the underground system, we might have to rewrite what we know about ancient civilizations. It could mean there were earlier advanced groups who helped the Egyptians or that the Egyptians themselves were far more advanced than we realized. This chapter is about why this discovery is so important for understanding our past. 

I think the 2 kilometer underground system with its giant pillars and boxes proves that human beings have always been clever and creative. The more we learn, the more we realize how much we still don’t know. This makes studying history really fun and full of surprises.`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
