<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 3: The Underground Pillars Discovery

Researchers used special Synthetic Aperture Radar to scan deep under the Giza plateau. In the best case they found eight giant vertical pillars or cylinders right under the pyramids. These pillars are massive and go down more than 600 meters into the solid bedrock. Thats deeper than the tallest buildings in the world today! 

Each pillar has spiral pathways or coils winding around it like giant staircases. They look completely man-made and not like natural rock formations. The best case is that these were built on purpose as part of a huge underground system connected straight to the base of the Great Pyramid. The pillars might have been used to move things up and down safely or maybe even for some kind of energy system. 

This is so awesome because it means the pyramids we can see above the ground are only the top part of something much much bigger. The radar shows clear geometric patterns that dont look random at all. I think the best case is true because everything lines up too perfectly to be just an accident. Eight huge spiral pillars going over 600 meters deep is some of the most incredible engineering I have ever heard of. 

This discovery could completely change everything we know about ancient Egypt. The ancient people were way more advanced than we usually give them credit for. They must have planned this giant underground system for a very long time. The pillars are probably connected to the two giant boxes even deeper down. The whole thing might stretch almost 2 kilometers across under the desert sand. 

I get really excited thinking about how they built all of this without modern machines. This chapter is all about the pillars and why the best case makes them so important. It makes the pyramids even more mysterious and cool. If this is all real then the ancient Egyptians were true geniuses. I hope scientists keep studying this and maybe one day they will send robots down there to explore. That would be the coolest thing ever!`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
