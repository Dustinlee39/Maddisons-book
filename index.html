<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 4: The Giant Underground Boxes

Below the deep pillars the radar scans show two enormous box-like cubes. Each one is about 80 to 90 meters on every side. Thats the size of a really big building buried deep underground! These giant boxes connect to the eight spiral pillars and the whole system might stretch almost 2 kilometers across under the desert sand. 

In the best case these two giant boxes were the main centers of the whole underground system. They could have been used to store important treasures, ancient knowledge, gold, statues, or even special tools that we dont understand yet. The pillars with their spiral pathways act like giant connectors between the Great Pyramid above and these secret boxes way down below. 

The radar patterns are too straight and regular to be natural caves. The best case is that this is all artificial and was carefully built by the same smart people who made the pyramids on the surface. A 2 kilometer underground complex would be one of the greatest engineering projects in human history. I get so excited thinking about what might be inside those giant boxes. Maybe there are scrolls with lost knowledge, beautiful artwork, or secrets that could change what we know about the past. 

This makes the Great Pyramid way more special than just a tomb for a king. It could have been part of a giant machine or a place to protect important things for thousands of years. The ancient Egyptians must have worked for many generations to plan and build something this big and deep. They had to dig through solid rock and make everything perfectly straight. 

The best case shows they were master engineers who thought about both the surface and the deep underground. Old legends talk about hidden halls of records under the pyramids and this discovery might finally prove those stories are true. I love imagining explorers one day going down there with robots or lights to see what is really inside the giant boxes. This chapter is all about the boxes and why they are so important in the best case. The more I learn about it the more I believe the ancient people were much smarter than we usually think. This underground system makes the pyramids even cooler and more mysterious.`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
