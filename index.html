<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f4e9d8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reader {
        width: 100%;
        max-width: 390px;
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.25);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 45px 38px;
        overflow-y: auto;
        font-size: 1.08rem;
        line-height: 1.68;
        text-align: justify;
    }
    .page h1 {
        font-size: 1.45rem;
        text-align: center;
        margin: 0 0 30px 0;
        color: #1a2f2a;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 12px;
    }
    .controls {
        padding: 18px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 50px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.9rem;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 6: How Radar Found It

Modern SAR radar technology is really cool because it lets scientists look deep underground without digging up the pyramids. SAR stands for Synthetic Aperture Radar. It works by sending special signals from satellites or planes and then measuring how those signals bounce back from different materials under the ground. 

The researchers used this technology to scan under the Giza plateau. In the best case, the radar clearly showed the eight giant spiral pillars and the two enormous boxes deep below. At first some people found it hard to believe, but the patterns kept showing up again and again. The shapes are too perfect and geometric to be natural caves or random rock formations. 

This technology is changing archaeology because it is safe and doesn’t damage the ancient sites. Older tools could only see a little bit underground, but SAR can go much deeper. The best case is that these deep scans finally prove there is a massive 2 kilometer underground system connected to the Great Pyramid. The radar data shows the pillars going over 600 meters down and the giant boxes at the bottom. 

I think this is only the beginning of new discoveries at Giza. More studies with better scanners and maybe small robots will help us learn even more. The radar doesn’t lie when the patterns are this clear and consistent. Scientists from Italy and other countries worked together to collect this data. 

This chapter explains how the underground system was discovered and why the best case is so believable. It makes me excited about the future because new technology is helping us understand the past better than ever before. The ancient Egyptians hid their secrets so well that it took thousands of years and modern radar to start finding them. If this is all true, it shows how smart they were at hiding and protecting important things. I hope one day we get to see real pictures or videos from inside the pillars and boxes!`

];

let current = 0;

function render(){
    const content = pages[current];
    const title = content.split("\n")[0];
    const body = content.split("\n").slice(1).join("<br><br>");
    document.getElementById("page").innerHTML = `<h1>\( {title}</h1> \){body}`;
}

function nextPage(){}
function prevPage(){}

render();

</script>

</body>
</html>
