<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid Mysteries</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f8f1e3;
        font-family: Georgia, "Times New Roman", serif;
        color: #2c2c2c;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .reader {
        width: 100%;
        max-width: 380px;           /* Good for 9/16 vertical feel */
        height: 100vh;
        background: #fdfaf0;
        box-shadow: 0 0 30px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .page {
        flex: 1;
        padding: 40px 35px;
        overflow-y: auto;
        font-size: 1.05rem;
        line-height: 1.65;
        text-align: justify;
        background: #fdfaf0;
    }
    .page h1 {
        font-size: 1.4rem;
        text-align: center;
        margin-bottom: 25px;
        color: #1a3c34;
        border-bottom: 2px solid #d4b38a;
        padding-bottom: 10px;
    }
    .controls {
        padding: 15px;
        background: #f0e6d2;
        display: flex;
        justify-content: center;
        gap: 40px;
        border-top: 1px solid #d4b38a;
    }
    button {
        background: #8c5a2b;
        color: white;
        border: none;
        font-size: 1.8rem;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        cursor: pointer;
    }
    button:active {
        background: #5c3a1f;
    }
</style>
</head>
<body>

<div class="reader">
    <div class="page" id="page"></div>

    <div class="controls">
        <button onclick="prevPage()">⬅</button>
        <button onclick="nextPage()">➡</button>
    </div>
</div>

<script>

const pages = [

`Chapter 1: Introduction to the Pyramids

Hi I am 13 years old and I made this book about the pyramids in Egypt because they are so cool and mysterious. The Great Pyramid is the biggest and most amazing one of all. It was built more than 4,500 years ago for Pharaoh Khufu. Thats older than almost anything else we know! It is made of over two million giant stone blocks, some weighing tons each. Even today with modern cranes it would be super hard to move them safely.

There are three big pyramids at Giza. The Great Pyramid is the tallest, then theres one for Khafre and a smaller one for Menkaure. They are lined up perfectly and face exactly north, south, east, and west. Most people think the pyramids were only fancy tombs but I think there is way more to the story. Inside there are secret chambers and long narrow passages.

Scientists have already found hidden voids using special scanners. But the most exciting part is what might be deep underground. New radar technology called SAR has shown possible huge man-made structures way below the Great Pyramid. In this book I will explain the best case for these discoveries. The best case is that the ancient Egyptians were much smarter than we thought and built a giant underground system almost 2 kilometers big with pillars and boxes. Its really mind blowing!`,

`Chapter 2: How the Pyramids Were Built

The Great Pyramid originally stood about 146 meters tall and its base is enormous. The stones fit so perfectly you can barely put a piece of paper between them even after thousands of years. They used limestone and granite brought from far away.

It probably took about 20 years and over 20,000 workers. They had a whole village with food and doctors. The pyramids are aligned perfectly with the stars which shows they knew a lot about astronomy.

Modern scans found big empty spaces inside. All this proves the builders were master engineers. This makes the best case for the underground stuff even stronger. If they could build something so perfect on top, they could definitely build amazing things deep underground too.`,

`Chapter 3: The Underground Pillars Discovery

Researchers used Synthetic Aperture Radar and in the best case found eight giant vertical pillars right under the pyramids. These pillars go down more than 600 meters into the bedrock. Each one has spiral pathways winding around it like giant staircases.

The best case is that these were built on purpose as part of a huge underground system connected to the Great Pyramid. The radar shows clear geometric patterns that dont look natural. Eight huge spiral pillars over 600 meters deep is incredible engineering.`,

`Chapter 4: The Giant Underground Boxes

Below the pillars are two enormous box-like cubes. Each one is about 80 to 90 meters on every side. The whole system might stretch almost 2 kilometers across under the desert.

In the best case these giant boxes were the main centers for storage or power. The radar patterns are too straight to be natural. This could be one of the greatest engineering projects ever. I get excited thinking about what might be inside those boxes.`,

`Chapter 5: Possible Purposes of the System

In the best case the underground system had many purposes. It could protect treasures, be used for secret ceremonies, or hold the Hall of Records. The spiral pillars might work like ramps or help with energy.

Some think the whole thing could harness power from the earth. Old legends about hidden chambers might be true. This proves how clever the ancient Egyptians really were.`,

`Chapter 6: How Radar Found It

Modern SAR radar lets us see deep underground without digging. It sends signals and measures the reflections. The best case is that the data clearly shows the pillars and boxes.

This technology is really cool and is changing how we explore the past. More studies will help us learn even more about the 2 kilometer system.`,

`Chapter 7: What It Means for History

If the best case is true, this discovery would change history books. It would prove the Egyptians had advanced engineering both above and below ground. The Great Pyramid was part of something much bigger.

These ideas make me want to be an archaeologist. History still has big secrets waiting to be found.`,

`Chapter 8: Conclusion and My Thoughts

The Egyptian pyramids are the most incredible achievements of the ancient world. The possible 2 kilometer underground system with spiral pillars and giant boxes is one of the coolest mysteries ever.

In the best case it shows how smart the builders were. I hope more research happens soon. Thanks for reading my book! Pyramids are the coolest thing ever.`

];

let current = 0;

function render(){
    document.getElementById("page").innerHTML = "<h1>" + pages[current].split("\n")[0] + "</h1>" + 
        pages[current].split("\n").slice(1).join("<br><br>");
}

function nextPage(){
    if(current < pages.length - 1){ current++; render(); }
}

function prevPage(){
    if(current > 0){ current--; render(); }
}

document.addEventListener("keydown", e => {
    if(e.key === "ArrowRight") nextPage();
    if(e.key === "ArrowLeft") prevPage();
});

render();

</script>

</body>
</html>
